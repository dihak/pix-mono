name: Publish

on:
  # Fires after CI completes on main — no duplicate quality gate.
  # The publish job checks that a release tag points to the validated SHA.
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  # Manual fallback from the Actions tab.
  workflow_dispatch:

jobs:
  publish:
    # For workflow_run: only proceed when CI passed.
    # For workflow_dispatch: always proceed (operator takes responsibility).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC) + provenance.
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Check out the exact SHA CI validated (not the default branch tip).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          # Fetch tags so `git tag --points-at HEAD` can find the release-* tag
          # that triggered this workflow. Without this, the targeted SHA-only
          # refspec above omits refs/tags/* and the tag check below returns empty,
          # silently skipping the publish.
          fetch-tags: true

      # Check whether a release tag points at this commit.
      # If none found, skip publish silently — this is a plain main push, not a release.
      - name: Check for release tag on this commit
        id: tag
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^release-[0-9]{8}-[0-9]{4}$' | head -1)
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$TAG" ]; then
            echo "No release tag on this commit — skipping publish."
          else
            echo "Release tag found: $TAG"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.tag.outputs.value != ''
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        if: steps.tag.outputs.value != ''
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        if: steps.tag.outputs.value != ''
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.tag.outputs.value != ''
        run: bun install --frozen-lockfile

      # Pre-publish guard: fail fast if any changed package forgot to
      # bump its version (already published to npm at that version).
      - name: Check versions not already on npm
        if: steps.tag.outputs.value != ''
        run: bun scripts/check-versions.ts

      # Publishes every package whose version is not yet on npm (idempotent).
      # Authentication is via OIDC trusted publishing (no NPM_TOKEN); provenance
      # is attached automatically.
      - name: Publish changed packages to npm
        if: steps.tag.outputs.value != ''
        run: bun run publish:all
        env:
          NPM_CONFIG_PROVENANCE: "true"
