name: Publish

on:
  push:
    tags:
      - "release-*"
  # Manual fallback from the Actions tab.
  workflow_dispatch:

jobs:
  # Re-run the full quality gate so a tag can never publish unverified code.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC) + provenance.
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 ships an npm new enough for OIDC trusted publishing. The
      # registry-url is required so the npm CLI knows the publish target and
      # engages OIDC; without it the CLI falls back to ENEEDAUTH (npm/cli#8730).
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Belt-and-suspenders: ensure npm CLI >= 11.5.1 for trusted publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Publishes every package whose version is not yet on npm (idempotent).
      # Authentication is via OIDC trusted publishing (no NPM_TOKEN); provenance
      # is attached automatically.
      - name: Publish changed packages to npm
        run: bun run publish:all
        env:
          # Force provenance for OIDC trusted publishing (npm/cli#8730).
          NPM_CONFIG_PROVENANCE: "true"
