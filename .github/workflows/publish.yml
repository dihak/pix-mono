name: Publish

on:
  push:
    tags:
      # Plain semver tags without a leading "v", e.g. 1.0.0, 1.2.0, 2.0.0-rc.1
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Re-run the full quality gate so a tag can never publish unverified code.
      - name: Lint & format (biome ci)
        run: bun run ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # Publishes every package whose version is not yet on npm (idempotent).
      - name: Publish changed packages to npm
        run: bun run publish:all
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
